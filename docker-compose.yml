services:
  tools:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    working_dir: /repo
    volumes:
      - .:/repo
      - tools_node_modules:/repo/node_modules
    environment:
      # Playwright launches its own static server on localhost:8080 inside
      # this container (see playwright.config.js → webServer). The page
      # origin is then http://localhost:8080, a secure context, so
      # crypto.subtle (used by aws4fetch's SigV4 HMAC) is available.
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: test-bucket
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    # No depends_on — Makefile brings up minio explicitly for E2E.

  # Static server for human-side dev access at localhost:8888. Not used
  # by E2E — Playwright starts its own server inside the tools container
  # so the page origin is localhost (a secure context).
  static:
    image: caddy:2-alpine
    command: caddy file-server --listen :8080 --root /repo
    volumes:
      - .:/repo:ro
    ports:
      - "${WEBGALLERY_STATIC_PORT:-8888}:8080"

  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin >/dev/null 2>&1; do sleep 1; done;
      mc mb -p local/test-bucket >/dev/null;
      echo 'minio init complete';
      "

volumes:
  tools_node_modules:
  minio_data:
