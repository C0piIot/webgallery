<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; worker-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: http:; media-src 'self' blob: https: http:; connect-src 'self' https: http:; manifest-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none'">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>webgallery — Storage</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#212529">
  <link rel="stylesheet" href="./vendor/bootstrap.min.css">
</head>
<body>
  <nav class="navbar navbar-expand navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="./index.html">webgallery</a>
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="./index.html">Gallery</a></li>
        <li class="nav-item"><a class="nav-link active" aria-current="page" href="./setup-storage.html">Storage</a></li>
        <li class="nav-item"><a class="nav-link" href="./setup-folders.html">Folders</a></li>
      </ul>
    </div>
  </nav>

  <main class="container py-3" style="max-width: 36rem;">
    <h1 class="h4 mb-3">Storage</h1>
    <p class="text-muted small">
      Connect to your S3-compatible bucket. Credentials are stored locally
      in your browser and never sent anywhere except the bucket you
      configure here.
    </p>

    <form id="storage-form" novalidate>
      <div class="mb-3">
        <label for="provider" class="form-label">Provider</label>
        <select id="provider" class="form-select">
          <option value="aws">AWS S3</option>
          <option value="r2">Cloudflare R2</option>
          <option value="b2">Backblaze B2</option>
          <option value="minio">MinIO</option>
          <option value="custom" selected>Custom (S3-compatible)</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="endpoint" class="form-label">Endpoint</label>
        <input id="endpoint" name="endpoint" type="url" class="form-control" autocomplete="off" required>
        <div class="invalid-feedback" data-error-for="endpoint"></div>
      </div>

      <div class="mb-3">
        <label for="region" class="form-label">Region</label>
        <input id="region" name="region" type="text" class="form-control" autocomplete="off" required>
        <div class="invalid-feedback" data-error-for="region"></div>
      </div>

      <div class="mb-3">
        <label for="bucket" class="form-label">Bucket</label>
        <input id="bucket" name="bucket" type="text" class="form-control" autocomplete="off" required>
        <div class="invalid-feedback" data-error-for="bucket"></div>
      </div>

      <div class="mb-3">
        <label for="prefix" class="form-label">Prefix</label>
        <input id="prefix" name="prefix" type="text" class="form-control" autocomplete="off" required>
        <div class="form-text">A path your uploads will be namespaced under (e.g. <code>phone</code>, <code>laptop</code>, <code>family-2024</code>).</div>
        <div class="invalid-feedback" data-error-for="prefix"></div>
      </div>

      <div class="mb-3">
        <label for="accessKeyId" class="form-label">Access key ID</label>
        <input id="accessKeyId" name="accessKeyId" type="text" class="form-control" autocomplete="off" required>
        <div class="invalid-feedback" data-error-for="accessKeyId"></div>
      </div>

      <div class="mb-3">
        <label for="secretAccessKey" class="form-label">Secret access key</label>
        <input id="secretAccessKey" name="secretAccessKey" type="password" class="form-control" autocomplete="off" required>
        <div class="invalid-feedback" data-error-for="secretAccessKey"></div>
      </div>

      <div class="form-check form-switch mb-3">
        <input id="pathStyle" name="pathStyle" type="checkbox" class="form-check-input" role="switch">
        <label class="form-check-label" for="pathStyle">Path-style URLs</label>
      </div>

      <div id="result" class="d-none" role="status" aria-live="polite"></div>

      <div class="d-flex gap-2 mt-3">
        <button id="test-btn" type="button" class="btn btn-outline-primary">Test connection</button>
        <button id="save-btn" type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </main>

  <script type="module" src="./setup-storage.js"></script>
</body>
</html>
