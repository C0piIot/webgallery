<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; worker-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: http:; media-src 'self' blob: https: http:; connect-src 'self' https: http:; manifest-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none'">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>webgallery — Folders</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#212529">
  <link rel="stylesheet" href="./vendor/bootstrap.min.css">
</head>
<body>
  <nav class="navbar navbar-expand navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="./index.html">webgallery</a>
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="./index.html">Gallery</a></li>
        <li class="nav-item"><a class="nav-link" href="./setup-storage.html">Storage</a></li>
        <li class="nav-item"><a class="nav-link active" aria-current="page" href="./setup-folders.html">Folders</a></li>
      </ul>
      <button id="install-btn" type="button"
              class="btn btn-sm btn-outline-light ms-auto d-none">Install</button>
    </div>
  </nav>

  <main class="container py-3" style="max-width: 36rem;">
    <h1 class="h4 mb-3">Folders</h1>
    <p class="text-muted small">
      Folders to back up. The browser asks for permission to read each folder
      once per session, so re-granting after a fresh page load is normal.
    </p>

    <div id="content">
      <div class="d-flex gap-2 align-items-center">
        <button id="add-btn" type="button" class="btn btn-primary">+ Add folder</button>
      </div>
      <div id="add-error" class="text-danger small mt-2 d-none"></div>

      <div id="folders" class="list-group mt-3"></div>

      <div id="empty" class="text-muted text-center py-4 d-none">
        No folders configured. Add one to start backup.
      </div>
    </div>
  </main>

  <script type="module" src="./setup-folders.js"></script>
</body>
</html>
