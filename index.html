<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; worker-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: http:; media-src 'self' blob: https: http:; connect-src 'self' https: http:; manifest-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none'">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>webgallery — Gallery</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#212529">
  <link rel="stylesheet" href="./vendor/bootstrap.min.css">
</head>
<body>
  <nav class="navbar navbar-expand navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="./index.html">webgallery</a>
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link active" aria-current="page" href="./index.html">Gallery</a></li>
        <li class="nav-item"><a class="nav-link" href="./setup-storage.html">Storage</a></li>
        <li class="nav-item"><a class="nav-link" href="./setup-folders.html">Folders</a></li>
      </ul>
      <button id="install-btn" type="button"
              class="btn btn-sm btn-outline-light ms-auto d-none">Install</button>
    </div>
  </nav>

  <main class="container py-3">
    <ul class="nav nav-tabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="tab-local" data-tab="local" type="button" role="tab" aria-controls="pane-local">Local</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="tab-remote" data-tab="remote" type="button" role="tab" aria-controls="pane-remote">Remote</button>
      </li>
    </ul>
    <div class="tab-content border border-top-0 p-3">
      <div class="tab-pane" id="pane-local" role="tabpanel" aria-labelledby="tab-local">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <div id="local-summary" class="text-muted small"></div>
          <div class="d-flex align-items-center gap-2">
            <span id="local-offline-pill" class="badge bg-warning text-dark d-none">⚠️ Offline</span>
            <div class="btn-group btn-group-sm">
              <button id="local-retry-errored" type="button" class="btn btn-outline-warning" disabled>Retry errored</button>
              <button id="local-rewalk" type="button" class="btn btn-primary" disabled>Re-walk</button>
            </div>
          </div>
        </div>
        <div id="local-grid" class="row row-cols-2 row-cols-md-3 row-cols-lg-4 g-3"></div>
        <div id="local-empty" class="text-muted text-center py-4 d-none">
          Nothing indexed yet. Add a folder in Folders, then click Re-walk.
        </div>
      </div>
      <div class="tab-pane" id="pane-remote" role="tabpanel" aria-labelledby="tab-remote">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <div id="remote-summary" class="text-muted small"></div>
          <div class="d-flex align-items-center gap-2">
            <span id="remote-offline-pill" class="badge bg-warning text-dark d-none">⚠️ Offline</span>
            <button id="remote-refresh" type="button" class="btn btn-sm btn-primary" disabled>Refresh</button>
          </div>
        </div>
        <div id="remote-grid" class="row row-cols-2 row-cols-md-3 row-cols-lg-4 g-3"></div>
        <div id="remote-sentinel" style="height: 1px;"></div>
        <div id="remote-empty" class="text-muted text-center py-4 d-none">
          Nothing in the bucket yet. Upload something from the Local tab.
        </div>
      </div>
    </div>
  </main>

  <dialog id="detail-dialog" class="rounded p-0 border-0"
          style="max-width: min(95vw, 800px); width: 100%;">
    <div class="d-flex justify-content-between align-items-center p-3 border-bottom gap-2">
      <h5 id="detail-filename" class="mb-0 text-truncate flex-grow-1">—</h5>
      <button id="detail-close" type="button" class="btn-close" aria-label="Close"></button>
    </div>
    <div class="p-3">
      <div id="detail-media" class="ratio ratio-16x9 bg-light mb-3"></div>
      <dl class="row mb-0 small">
        <dt class="col-4 col-sm-3">Captured</dt>
        <dd id="detail-captured" class="col-8 col-sm-9 mb-2">—</dd>
        <dt class="col-4 col-sm-3">Source</dt>
        <dd id="detail-source" class="col-8 col-sm-9 mb-2 text-truncate">—</dd>
        <dt class="col-4 col-sm-3">Size</dt>
        <dd id="detail-size" class="col-8 col-sm-9 mb-0">—</dd>
      </dl>
    </div>
    <div class="d-flex justify-content-end gap-2 p-3 border-top">
      <button id="detail-delete" type="button" class="btn btn-danger" disabled>Delete</button>
      <button id="detail-close-bottom" type="button" class="btn btn-secondary">Close</button>
    </div>
  </dialog>

  <script type="module" src="./index.js"></script>
</body>
</html>
